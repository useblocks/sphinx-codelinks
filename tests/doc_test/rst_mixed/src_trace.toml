[codelinks.projects.src]
remote_url_pattern = "https://github.com/useblocks/sphinx-codelinks/blob/{commit}/{path}#L{line}"

[codelinks.projects.src.analyse]
get_rst = true
get_oneline_needs = true

[codelinks.projects.src.analyse.oneline_comment_style]
start_sequence = "[["
end_sequence = "]]"
field_split_char = ","

[[codelinks.projects.src.analyse.oneline_comment_style.needs_fields]]
name = "title"
type = "str"

[[codelinks.projects.src.analyse.oneline_comment_style.needs_fields]]
name = "id"
type = "str"

[[codelinks.projects.src.analyse.oneline_comment_style.needs_fields]]
name = "type"
type = "str"
default = "impl"
